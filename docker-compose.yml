# Production-style stack: nginx serves the SPA and proxies /api to the API.
# Scale API replicas: docker compose up --build --scale server=3
services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "${CLIENT_HTTP_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3001
      # Browser talks to nginx on the same origin; CORS is only needed for cross-origin dev.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      ASSISTANT_SYSTEM_PROMPT: ${ASSISTANT_SYSTEM_PROMPT:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      RAG_MATCH_THRESHOLD: ${RAG_MATCH_THRESHOLD:-0.5}
      RAG_MATCH_COUNT: ${RAG_MATCH_COUNT:-5}
      INGEST_SECRET: ${INGEST_SECRET:-}
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
